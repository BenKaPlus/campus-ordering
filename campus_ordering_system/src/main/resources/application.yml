# ==================== 全局配置 ====================
spring:
  application:
    name: campus-ordering-system # 应用名称
  profiles:
    active: dev # 激活环境：dev-开发环境 prod-生产环境
  servlet:
    multipart:
      max-file-size: 10MB # 单个文件最大大小
      max-request-size: 20MB # 单次请求最大大小
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss # 全局日期格式
    time-zone: GMT+8 # 时区
    default-property-inclusion: non_null # 不返回null字段

# ==================== MyBatis-Plus配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml # Mapper XML文件位置
  type-aliases-package: com.campus.ordering.entity # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL日志打印（开发环境）
  global-config:
    db-config:
      id-type: auto # 主键自增
      logic-delete-field: isDeleted # 逻辑删除字段
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# ==================== JWT配置 ====================
jwt:
  secret: campus-ordering-system-secret-key-2024-jwt-token # JWT密钥（生产环境请更换为强密钥）
  expiration: 7200 # 访问令牌过期时间（秒），2小时
  refresh-expiration: 604800 # 刷新令牌过期时间（秒），7天

# ==================== 系统配置 ====================
system:
  order:
    expire-minutes: 30 # 订单支付过期时间（分钟）
  file:
    upload-path: /data/campus-ordering/upload # 文件上传路径
    access-url: http://localhost:8080/api/file # 文件访问URL前缀

# ==================== 日志配置 ====================
logging:
  level:
    root: info
    com.campus.ordering: debug # 项目包日志级别
    org.springframework.security: debug # Spring Security日志级别
  file:
    name: /data/campus-ordering/logs/campus-ordering.log # 日志文件路径
  logback:
    rollingpolicy:
      max-file-size: 100MB # 单个日志文件最大大小
      max-history: 30 # 日志保留天数