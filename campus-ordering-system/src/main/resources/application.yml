# ==================== 全局配置 ====================
spring:
  application:
    name: campus-ordering-system
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# ==================== MyBatis-Plus配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml # Mapper XML文件位置
  type-aliases-package: com.campus.ordering.entity # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # SQL日志打印（开发环境）
  global-config:
    db-config:
      id-type: auto # 主键自增
      logic-delete-field: isDeleted # 逻辑删除字段
      logic-delete-value: 1 # 逻辑删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# ==================== JWT配置 ====================
jwt:
  secret: campus-ordering-system-secret-key-2024-jwt-token # JWT密钥（生产环境请更换为强密钥）
  expiration: 7200 # 访问令牌过期时间（秒），2小时
  refresh-expiration: 604800 # 刷新令牌过期时间（秒），7天

# ==================== 系统配置 ====================
system:
  order:
    expire-minutes: 30 # 订单支付过期时间（分钟）
  file:
    upload-path: D:\\data\\campus-ordering\\upload # 文件上传路径
    access-url: http://localhost:8080/api/file # 文件访问URL前缀

# ==================== 阿里云OSS配置 ====================
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: firstaliyun-twk
    region: cn-beijing
    base-url: https://firstaliyun-twk.oss-cn-beijing.aliyuncs.com

# ==================== 日志配置 ====================
logging:
  level:
    root: info
    com.campus.ordering: debug
    org.springframework.security: debug
  file:
    name: /data/campus-ordering/logs/campus-ordering.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30