# ==================== 开发环境服务器配置 ====================
server:
  port: 8080 # 开发环境端口
  servlet:
    context-path: /api # 接口前缀

# ==================== 开发环境数据源配置（Druid） ====================
spring:
  mvc:
    pathMatch:
      matching-strategy: ant_path_matcher
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_ordering_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root # 开发环境数据库账号
    password: root # 开发环境数据库密码
    # Druid连接池配置
    druid:
      initial-size: 5 # 初始连接数
      min-idle: 5 # 最小空闲连接数
      max-active: 20 # 最大活跃连接数
      max-wait: 60000 # 获取连接等待超时时间（毫秒）
      time-between-eviction-runs-millis: 60000 # 检测空闲连接间隔时间（毫秒）
      min-evictable-idle-time-millis: 300000 # 连接最小空闲时间（毫秒）
      validation-query: SELECT 1 # 连接有效性检测SQL
      test-while-idle: true # 检测空闲连接
      test-on-borrow: false # 获取连接时不检测
      test-on-return: false # 归还连接时不检测
      # 监控配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ==================== 开发环境Redis配置 ====================
  redis:
    host: localhost
    port: 6379
    password: # 开发环境Redis密码（无则留空）
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

# ==================== 开发环境支付配置（沙箱环境） ====================
# 微信支付沙箱配置
wx:
  pay:
    app-id: wx1234567890abcdef # 微信支付APPID（沙箱）
    mch-id: 1234567890 # 微信支付商户号（沙箱）
    api-v3-key: wxpayapiv3key1234567890abcdefghij # API V3密钥（沙箱）
    private-key-path: classpath:cert/wxpay/apiclient_key.pem # 商户私钥路径
    merchant-serial-number: 1234567890ABCDEF1234567890ABCDEF12345678 # 商户证书序列号
    notify-url: http://localhost:8080/api/common/pay/callback/wx # 支付回调地址（开发环境用内网穿透）
    refund-notify-url: http://localhost:8080/api/common/refund/callback/wx # 退款回调地址

# 支付宝沙箱配置
ali:
  pay:
    app-id: 2021001234567890 # 支付宝APPID（沙箱）
    private-key: MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC... # 应用私钥
    public-key: MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA... # 支付宝公钥
    gateway-url: https://openapi.alipaydev.com/gateway.do # 支付宝网关（沙箱）
    notify-url: http://localhost:8080/api/common/pay/callback/ali # 支付回调地址
    refund-notify-url: http://localhost:8080/api/common/refund/callback/ali # 退款回调地址
    sign-type: RSA2
    charset: utf-8
    format: json

# ==================== 开发环境短信配置（阿里云短信示例） ====================
aliyun:
  sms:
    access-key-id: LTAI5t1234567890abcdef # AccessKey ID
    access-key-secret: abcdefghijklmnopqrstuvwxyz123456 # AccessKey Secret
    sign-name: 校园点餐系统 # 短信签名
    template-code: SMS_123456789 # 短信模板CODE